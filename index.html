<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>VidScript — Free Video Downloader & AI Transcripts</title>
    <meta
      name="description"
      content="Download videos and images from Instagram, Facebook, X, YouTube and TikTok. Get instant AI transcripts for free."
    />
    <style>
      :root { background: #f8fafc; }
      html.dark { background: #030712; }
      body { margin: 0; }
    </style>
    <script>
      (function () {
        const t = localStorage.getItem("theme") || "dark";
        if (t === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
